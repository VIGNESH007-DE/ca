<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }

        .chat-container {
            height: calc(100vh - 160px);
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #3b82f6;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            background-color: white;
            color: #1f2937;
            border-bottom-left-radius: 2px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .loading-dots div {
            width: 8px;
            height: 8px;
            background-color: #9ca3af;
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots .dot1 { animation-delay: -0.32s; }
        .loading-dots .dot2 { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 py-4 px-6 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg">
                    <i class="fas fa-robot text-white text-xl"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800">Gemini Flash AI</h1>
            </div>
            <div class="text-xs font-medium text-gray-500 uppercase tracking-wider bg-gray-100 px-2 py-1 rounded">
                v2.5 Flash Preview
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main class="flex-grow flex flex-col items-center p-4">
        <div id="chat-window" class="chat-container w-full max-w-4xl overflow-y-auto no-scrollbar space-y-4 py-4 px-2">
            <!-- Welcome Message -->
            <div class="flex justify-start">
                <div class="ai-message message-bubble p-4 rounded-2xl">
                    <p class="text-sm">Hello! I'm powered by Gemini 2.5 Flash. How can I help you today?</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-white border-t border-gray-200 p-4 sticky bottom-0">
        <div class="max-w-4xl mx-auto">
            <form id="chat-form" class="flex items-center space-x-3">
                <input 
                    type="text" 
                    id="user-input" 
                    placeholder="Type your message..." 
                    class="flex-grow p-3 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                    autocomplete="off"
                >
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl transition-colors flex items-center justify-center"
                >
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
            <div class="text-center mt-4 text-sm text-gray-400 font-medium">
                Created by <span class="text-gray-600 font-bold">Vigneshwarna</span>
            </div>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const apiKey = "AIzaSyBUl98rjJDio3B6sWcrRghm2He0PAGxhJ8"; // API key is handled by the environment
        const model = "gemini-2.5-flash-preview-09-2025";

        // UI Helpers
        function addMessage(text, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-fade-in`;
            
            const bubble = document.createElement('div');
            bubble.className = `${isUser ? 'user-message' : 'ai-message'} message-bubble p-4 rounded-2xl shadow-sm`;
            
            // Handle newlines
            const formattedText = text.replace(/\n/g, '<br>');
            bubble.innerHTML = `<p class="text-sm leading-relaxed">${formattedText}</p>`;
            
            wrapper.appendChild(bubble);
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function showLoading() {
            const wrapper = document.createElement('div');
            wrapper.id = 'loading-indicator';
            wrapper.className = 'flex justify-start';
            
            wrapper.innerHTML = `
                <div class="ai-message message-bubble p-4 rounded-2xl flex items-center space-x-2">
                    <div class="loading-dots">
                        <div class="dot1"></div>
                        <div class="dot2"></div>
                        <div class="dot3"></div>
                    </div>
                </div>
            `;
            
            chatWindow.appendChild(wrapper);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function removeLoading() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
        }

        // API Interaction with Exponential Backoff
        async function fetchGeminiResponse(prompt, retryCount = 0) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{
                    parts: [{ text: prompt }]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    if (response.status === 429 && retryCount < 5) {
                        const delay = Math.pow(2, retryCount) * 1000;
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return fetchGeminiResponse(prompt, retryCount + 1);
                    }
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "I couldn't generate a response.";
            } catch (error) {
                console.error("Fetch error:", error);
                if (retryCount < 5) {
                    const delay = Math.pow(2, retryCount) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return fetchGeminiResponse(prompt, retryCount + 1);
                }
                throw error;
            }
        }

        // Event Listeners
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Clear input and disable UI
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message to UI
            addMessage(message, true);
            showLoading();

            try {
                const aiResponse = await fetchGeminiResponse(message);
                removeLoading();
                addMessage(aiResponse, false);
            } catch (error) {
                removeLoading();
                addMessage("Sorry, I encountered an error. Please try again later.", false);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        });
    </script>
</body>
</html>
